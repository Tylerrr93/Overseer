<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digitized Overseer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0a0a;
      font-family: monospace;
    }

    #game-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
      /* Prevent touch-drag scrolling on mobile */
      touch-action: none;
    }

    /* Loading screen — hidden once canvas renders */
    #boot-screen {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #00e5ff;
      z-index: 10;
      transition: opacity 0.6s;
    }

    #boot-screen h1 {
      font-size: clamp(1.4rem, 4vw, 2.4rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    #boot-screen p {
      color: #4a7a8a;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
    }

    #boot-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="boot-screen">
    <h1>Digitized Overseer</h1>
    <p>INITIALIZING CHASSIS . . .</p>
  </div>

  <canvas id="game-canvas"></canvas>

  <script type="module" src="/src/main.ts"></script>
  <script>
    // Hide boot screen after a short delay (first frame painted by then)
    window.addEventListener("load", () => {
      setTimeout(() => {
        document.getElementById("boot-screen")?.classList.add("hidden");
      }, 800);
    });
  </script>
</body>
</html>
